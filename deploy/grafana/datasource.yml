# Provisioning Prometheus-датасорса для Grafana.
# Имя `Prometheus` совпадает с переменной datasource в hope-hash.json.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
